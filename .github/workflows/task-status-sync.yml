name: Task Status Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write

jobs:
  move-to-pull-requested:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Move task to pull_requested
        run: |
          node scripts/task-status-sync.mjs --to pull_requested --branch "${{ github.head_ref }}"

      - name: Commit status update
        run: |
          if git diff --quiet; then
            echo "No task-status changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-pack/04-task-system/tasks
          git commit -m "chore: move task to pull_requested on PR submission"
          git push

  move-to-completed-on-approval:
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Move task to completed
        run: |
          node scripts/task-status-sync.mjs --to completed --branch "${{ github.event.pull_request.head.ref }}"

      - name: Commit status update
        run: |
          if git diff --quiet; then
            echo "No task-status changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-pack/04-task-system/tasks
          git commit -m "chore: move task to completed on PR approval"
          git push
