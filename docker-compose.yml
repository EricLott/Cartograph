

services:
  frontend:
    build: 
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:3000
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_DATABASE: 'cartograph_db'
      MYSQL_USER: 'cartograph'
      MYSQL_PASSWORD: 'cartograph_pass'
      MYSQL_ROOT_PASSWORD: 'root_password'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_USER=cartograph
      - DB_PASSWORD=cartograph_pass
      - DB_NAME=cartograph_db
      - DB_PORT=3306
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - ANTHROPIC_API_KEY
    depends_on:
      mysql:
        condition: service_healthy


volumes:
  mysql_data:
